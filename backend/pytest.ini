[pytest]
# Django 设置模块
DJANGO_SETTINGS_MODULE = application.settings

# 并行测试配置 - 自动使用所有 CPU 核心
addopts = -n auto
    --verbose
    --tb=short

# 测试路径
testpaths = tests

# Python 文件匹配模式
python_files = test_*.py

# Python 类匹配模式
python_classes = Test*

# Python 函数匹配模式
python_functions = test_*

# 标记
markers =
    django_db: 标记需要数据库访问的测试
    slow: 标记运行较慢的测试
